# Regression safety net for the AddToAlignmentModel plugin.
#
# Builds and runs the xUnit characterization tests on every pull request and
# gates on coverage of the Tier-1 pure logic (the code the eventual GEM work
# will touch). This is separate from github-action.yaml, which only runs on
# release tags.
#
# Runs on pull_request (one run per PR commit) and on push to main. Each run
# publishes the compiled plugin as the "plugin-dll" artifact, so it can be
# installed into NINA without a local build.
#
# Notification: the final step DELETES any prior status comment and POSTs a
# fresh one on every outcome. A subscribed Claude Code session is woken by
# issue_comment.created events only - editing a sticky comment in place (PATCH)
# or relying on check-run status does NOT wake it. The build/test output is
# tee'd to ci-run.log and its tail is embedded in failure comments so the
# session can diagnose without fetching auth-gated Actions logs.
#
# Windows is required: the plugin and its transitive NINA/WPF dependencies are
# Windows-only (net8.0-windows, UseWPF).
name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    runs-on: windows-latest

    env:
      TEST_PROJECT: tests/AddToAlignmentModel.Tests/AddToAlignmentModel.Tests.csproj
      # Tier-1 methods the gate enforces at >= 95% line coverage. ReadyToStart is
      # intentionally absent: it calls a WPF MessageBox and cannot be unit-tested
      # without a source refactor that this phase forbids.
      GATE_METHODS: 'AboveMinAlt,ValidateConnections,CreateCaptureSolverParameter,get_AltStepSize,get_AzStepSize'
      GATE_THRESHOLD: '0.95'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore $env:TEST_PROJECT

      # Combined so all output lands in ci-run.log (tee). bash on the runner uses
      # -eo pipefail, so a failed dotnet command fails the step and is captured.
      # -p:PostBuildEvent= neutralizes the plugin's local-install xcopy step,
      # which has no NINA install to copy to on CI; the property flows to the
      # referenced plugin project too.
      - name: Build and test
        shell: bash
        run: |
          dotnet build "$TEST_PROJECT" -c Release --no-restore -p:PostBuildEvent= 2>&1 | tee ci-run.log
          dotnet test "$TEST_PROJECT" -c Release --no-build \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory coverage \
            --logger "GitHubActions;summary.includePassedTests=false" \
            --logger "console;verbosity=normal" 2>&1 | tee -a ci-run.log

      # The compiled plugin, downloadable from the run's Artifacts and droppable
      # into NINA's plugins folder - no local build toolchain needed.
      - name: Upload plugin DLL
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dll
          path: |
            bin/Release/net8.0-windows/ADPUK.NINA.AddToAlignmentModel.dll
            bin/Release/net8.0-windows/ADPUK.NINA.AddToAlignmentModel.pdb
          if-no-files-found: warn

      - name: Generate HTML coverage report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          reportgenerator -reports:coverage/**/coverage.cobertura.xml -targetdir:coverage/report -reporttypes:"Html;TextSummary"

      - name: Coverage gate (Tier-1 methods >= 95%)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $report = Get-ChildItem -Path coverage -Recurse -Filter coverage.cobertura.xml | Select-Object -First 1
          if (-not $report) { 'gate: no cobertura coverage file found.' | Add-Content ci-run.log; Write-Error 'No cobertura coverage file found.'; exit 1 }

          [xml]$xml = Get-Content $report.FullName
          $targets   = $env:GATE_METHODS.Split(',')
          $threshold = [double]::Parse($env:GATE_THRESHOLD, [System.Globalization.CultureInfo]::InvariantCulture)

          $methods = $xml.SelectNodes('//class/methods/method')
          $failed = $false
          $seen = @{}
          $lines = New-Object System.Collections.Generic.List[string]

          foreach ($m in $methods) {
            $name = $m.GetAttribute('name')
            if ($targets -contains $name) {
              $rate = [double]::Parse($m.GetAttribute('line-rate'), [System.Globalization.CultureInfo]::InvariantCulture)
              $seen[$name] = $true
              if ($rate -lt $threshold) {
                $lines.Add(("FAIL  {0,-32} line-rate {1:P1} < {2:P0}" -f $name, $rate, $threshold)); $failed = $true
              } else {
                $lines.Add(("PASS  {0,-32} line-rate {1:P1}" -f $name, $rate))
              }
            }
          }
          foreach ($t in $targets) {
            if (-not $seen.ContainsKey($t)) {
              $lines.Add("FAIL  target method '$t' not found in coverage (no test exercised it?)"); $failed = $true
            }
          }

          $lines | ForEach-Object { Write-Host $_ }
          '=== Tier-1 coverage gate ===' | Add-Content ci-run.log
          $lines | Add-Content ci-run.log

          if ($failed) { Write-Error 'Tier-1 coverage gate failed.'; exit 1 }
          Write-Host 'Tier-1 coverage gate passed.'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/report

      # Delete any prior status comment, then POST a fresh one. The created event
      # is what wakes a subscribed session; an edited (PATCH) comment does not.
      - name: Post CI status to PR comment
        if: always() && github.event.pull_request.number
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          MARKER='<!-- ci-status-comment -->'
          {
            printf '%s\n' "$MARKER"
            case "$JOB_STATUS" in
              success)
                printf '## CI: passing — `%s`\n\n' "$RUN_ID"
                printf '**Run:** %s\n\n' "$RUN_URL"
                printf '**Head SHA:** `%s`\n\n' "$HEAD_SHA"
                if [ -f coverage/report/Summary.txt ]; then
                  printf '<details><summary>Tier-1 coverage summary</summary>\n\n```\n%s\n```\n\n</details>\n' "$(cat coverage/report/Summary.txt)"
                fi
                ;;
              cancelled)
                printf '## CI: cancelled — `%s`\n\n' "$RUN_ID"
                printf '**Run:** %s\n' "$RUN_URL"
                ;;
              *)
                printf '## CI: failing (%s) — `%s`\n\n' "$JOB_STATUS" "$RUN_ID"
                printf '**Run:** %s\n\n' "$RUN_URL"
                printf '**Head SHA:** `%s`\n\n' "$HEAD_SHA"
                TAIL="$( [ -f ci-run.log ] && tail -c 50000 ci-run.log || echo '(no log captured)' )"
                printf '<details><summary>Log tail</summary>\n\n```\n%s\n```\n\n</details>\n' "$TAIL"
                ;;
            esac
          } > ci-comment.md
          IDS="$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --jq "[.[] | select(.body | startswith(\"$MARKER\")) | .id] | .[]" 2>/dev/null || true)"
          for ID in ${IDS}; do
            gh api -X DELETE "repos/${REPO}/issues/comments/${ID}" >/dev/null || true
          done
          gh api -X POST "repos/${REPO}/issues/${PR_NUMBER}/comments" -F body=@ci-comment.md >/dev/null
